<style>
  :root {
    --bg: #170f24;
    --bg-panel: #221832;
    --accent: #eddafc;
    --accent-bright: #f6ecff;
    --gold: #e8b87a;
    --gold-bright: #f5d4a0;
    --red: #f06060;
    --text: #f4ede2;
    --dim: #c4b8d4;
    --border: #3e3060;
    --border-light: #544280;
    --font: 'Courier New', Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(120, 40, 160, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(90, 30, 120, 0.05) 0%, transparent 50%);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem;
  }
  #app {
    max-width: 860px;
    width: 100%;
  }

  /* --- Title with raisin graphics --- */
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 2.5rem;
  }
  .raisin-svg { flex-shrink: 0; }
  h1 {
    color: var(--gold);
    font-family: var(--font);
    font-size: 3.2rem;
    font-weight: bold;
    letter-spacing: 0.35em;
    margin-right: -0.35em;
    text-align: center;
    text-shadow: 0 2px 16px rgba(160, 100, 50, 0.3);
  }

  /* --- Subtitle --- */
  #subtitle {
    text-align: center;
    color: var(--dim);
    font-size: 1.25rem;
    margin-top: -1.5rem;
    margin-bottom: 2.75rem;
    letter-spacing: 0.1em;
  }
  #instructions {
    text-align: center;
    color: var(--accent-bright);
    font-size: 1.05rem;
    margin-bottom: 1rem;
    opacity: 1;
    line-height: 1.4;
  }

  /* --- Raisin counters ---
     Desktop layout:
       ┌────────────────────────────────────────┐
       │ Total Raisins: 12          Bar Raiser  │   ← #raisin-bar
       │            🍇 🍇 🍇 🍇 🍇                │   ← #stake-wrap
       │ ┌──────────────────────────────────┐   │
       │ │           cipher panel            │   │
       │ └──────────────────────────────────┘   │ */
  #raisin-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
    font-size: 1.3rem;
  }
  #total-raisins { color: var(--gold); }
  #current-level {
    color: var(--accent);
    font-size: inherit;
  }
  /* Desktop: prefix the level name with a dim "Level:" label.
     The mobile @media block suppresses this ::before entirely. */
  #current-level:not(:empty)::before {
    content: 'Level: ';
    color: var(--dim);
    margin-right: 0.3rem;
  }
  /* When showing the "Goal: N" preview (before the first level is
     reached), the label is baked into the text itself — suppress the
     "Level: " prefix so we don't end up with "Level: Goal: 15". */
  #current-level.next-preview::before { content: none; }
  /* Stake chips: centered above the cipher panel on desktop */
  #stake-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 0.85rem;
  }
  #stake-label { color: var(--accent); font-size: 1rem; letter-spacing: 0.06em; }
  #stake-raisins { display: inline-flex; gap: 0.45rem; align-items: center; }
  .stake-raisin {
    width: 38px;
    height: 36px;
    flex-shrink: 0;
    transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
    filter: drop-shadow(0 1px 3px rgba(80, 30, 120, 0.4));
  }
  .stake-raisin.spent {
    opacity: 0;
    transform: scale(0.4) rotate(-15deg);
    filter: grayscale(1) blur(1px);
  }
  .streak-message {
    margin-top: 0.5em;
    font-weight: bold;
    color: var(--accent);
  }
  #level-up-message {
    color: var(--accent-bright);
    font-size: 1.1rem;
    margin-top: 0.75rem;
    animation: levelUpGlow 1.5s ease-in-out;
  }
  @keyframes levelUpGlow {
    0% { opacity: 0; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* --- Confetti --- */
  .confetti-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1000;
    overflow: hidden;
  }
  .confetti-particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    opacity: 1;
    animation: confettiFall var(--fall-duration, 2.5s) ease-in forwards;
    animation-delay: var(--delay, 0s);
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    20% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(var(--rotation, 720deg)) scale(0.3); opacity: 0; }
  }

  /* --- Cipher panel --- */
  #cipher-display {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    margin-bottom: 1rem;
    text-align: center;
    font-size: calc(2rem * var(--sym-scale, 1));
    color: var(--accent);
    letter-spacing: 0.15em;
    word-spacing: 0.5em;
    line-height: 1.7;
    box-shadow: 0 4px 24px rgba(80, 30, 120, 0.12);
  }
  .cipher-word { display: inline-block; }
  .cipher-char { display: inline; }
  .cipher-char.revealed {
    text-transform: lowercase;
    color: var(--gold);
    animation: revealPop 0.35s ease-out;
  }
  #cipher-display.game-over .cipher-char.revealed {
    color: inherit;
  }
  @keyframes revealPop {
    0% { opacity: 0; transform: scale(1.5); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* --- Clue --- */
  #clue-display {
    text-align: center;
    color: var(--dim);
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    font-size: 1.5rem;
    line-height: 1.5;
  }
  #clue-display:not(:empty)::before { content: 'Clue: '; color: var(--gold); }

  /* --- Hints --- */
  #hints-area {
    margin-bottom: 0.5rem;
    min-height: 1rem;
  }
  .hint {
    display: inline-block;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.35rem 0.75rem;
    margin: 0.25rem 0.35rem;
    font-size: 1.25rem;
    color: var(--accent);
  }

  /* --- Input --- */
  #input-area {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
  #guess-input {
    flex: 1;
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 0.9rem 1.2rem;
    color: var(--accent-bright);
    font-family: var(--font);
    font-size: 1.15rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #guess-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(232, 184, 122, 0.18);
  }
  #guess-input::placeholder { color: var(--dim); }

  /* --- Buttons --- */
  button {
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 0.9rem 1.5rem;
    color: var(--gold);
    font-family: var(--font);
    font-size: 1.05rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  button:hover {
    border-color: var(--gold);
    background: rgba(232, 184, 122, 0.08);
    box-shadow: 0 2px 8px rgba(232, 184, 122, 0.12);
  }
  #submit-btn { color: #7cc88a; border-color: rgba(124, 200, 138, 0.25); }
  #submit-btn:hover {
    border-color: #7cc88a;
    background: rgba(124, 200, 138, 0.08);
    box-shadow: 0 2px 8px rgba(124, 200, 138, 0.1);
  }
  #giveup-btn { color: #e0976a; border-color: rgba(224, 151, 106, 0.25); }
  #giveup-btn:hover {
    color: #f0ad82;
    border-color: #e0976a;
    background: rgba(224, 151, 106, 0.08);
    box-shadow: 0 2px 8px rgba(224, 151, 106, 0.12);
  }
  #hint-btn { color: #a8b4f0; border-color: rgba(168, 180, 240, 0.25); }
  #hint-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  #hint-btn:hover {
    border-color: #a8b4f0;
    background: rgba(168, 180, 240, 0.08);
    box-shadow: 0 2px 8px rgba(168, 180, 240, 0.1);
  }
  #newgame-btn { color: #7cc88a; border-color: rgba(124, 200, 138, 0.25); }
  #newgame-btn:hover {
    border-color: #7cc88a;
    background: rgba(124, 200, 138, 0.08);
    box-shadow: 0 2px 8px rgba(124, 200, 138, 0.1);
  }
  #buttons { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }

  /* --- Feedback --- */
  #feedback {
    text-align: center;
    margin-bottom: 0.75rem;
    font-size: 1.15rem;
    min-height: 1rem;
  }
  .feedback-wrong { color: var(--red); }
  .feedback-correct { color: var(--accent-bright); font-weight: bold; font-size: 1.25rem; }

  /* --- Result Feedback (inside box) --- */
  #result-feedback {
    text-align: center;
    margin-bottom: 1.25rem;
    font-size: 1.15rem;
  }
  #result-feedback.feedback-correct { color: var(--accent-bright); font-weight: bold; font-size: 1.25rem; }
  #result-feedback.feedback-wrong { color: var(--red); }

  /* --- Result --- */
  #result {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    display: none;
    box-shadow: 0 4px 24px rgba(80, 30, 120, 0.12);
  }

  #result-raisins {
    text-align: center;
    color: var(--gold);
    font-size: 1.25rem;
    margin-top: 1.25rem;
    margin-bottom: 1.25rem;
  }
  #result-phrase {
    color: var(--accent);
    font-size: 1.4rem;
    margin-bottom: 1.25rem;
    text-align: center;
  }
  #result-phrase .typewriter-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: cursorBlink 0.6s step-end infinite;
  }
  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  #result-mapping {
    font-size: 1rem;
    color: var(--dim);
    line-height: 2;
    word-break: break-word;
  }

  /* --- Result Actions --- */
  #result-actions {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 1.25rem;
  }
  #share-btn {
    color: #a8b4f0;
    border-color: rgba(168, 180, 240, 0.25);
  }
  #share-btn:hover {
    border-color: #a8b4f0;
    background: rgba(168, 180, 240, 0.08);
    box-shadow: 0 2px 8px rgba(168, 180, 240, 0.1);
  }
  #share-toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    color: var(--accent-bright);
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 1rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  #share-toast.show { opacity: 1; }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    /* ─── Mobile: a self-contained "scrying tablet" view ────────────────
       The game UI fills 100dvh exactly. Heft is distributed across three
       zones so leftover height shows up as breathing room around real
       weight, never a single dead gap.

         ┌──────────────────────────────┐
         │   PHRAISINS  (heraldic)      │  ← header zone
         │   subtitle · raisin HUD      │
         ├──────────────────────────────┤
         │                              │
         │       [ cipher panel ]       │  ← centerpiece (capped grow)
         │                              │
         │   clue · hints · feedback    │
         ├──────────────────────────────┤
         │   [ input ] [ buttons ]      │  ← anchored controls
         └──────────────────────────────┘
       Footer lives below 100dvh — scroll to reveal.                    */

    body {
      padding: 0;
      min-height: 0;
      background-attachment: fixed;
      /* Layered atmospheric glow biased toward the cipher's resting spot */
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 39%, rgba(120, 60, 180, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse at 15% 0%, rgba(120, 40, 160, 0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(90, 30, 120, 0.06) 0%, transparent 50%);
    }
    #app {
      min-height: 100dvh;
      /* Generous horizontal padding so the title raisins never kiss the edge */
      padding: 1rem 1.15rem 0.9rem;
      display: flex;
      flex-direction: column;
    }

    /* ── Header zone ─────────────────────────────────────────────── */
    .title-row {
      gap: clamp(0.5rem, 2.5vw, 1rem);
      margin-bottom: 0.6rem;
    }
    .raisin-svg {
      width: clamp(28px, 8vw, 44px);
      height: clamp(26px, 7.2vw, 40px);
      filter: drop-shadow(0 2px 6px rgba(80, 30, 120, 0.5));
    }
    h1 {
      font-size: clamp(1.85rem, 8.5vw, 2.55rem);
      letter-spacing: clamp(0.1em, 0.4vw, 0.15em);
      margin-right: clamp(-0.15em, -0.4vw, -0.1em);
      text-shadow:
        0 2px 14px rgba(160, 100, 50, 0.4),
        0 0 24px rgba(232, 184, 122, 0.14);
    }

    #subtitle {
      font-size: clamp(0.95rem, 3.7vw, 1.15rem);
      margin-top: 0.15rem;
      margin-bottom: 1.1rem;
      letter-spacing: 0.05em;
      opacity: 0.85;
      line-height: 1.5;
    }
    #subtitle.hidden-mobile { display: none !important; }
    /* Mobile only: each sentence on its own line so "Achieve grapeness."
       never wraps mid-phrase. */
    #subtitle span { display: block; }

    /* Raisin counters: single row under the subtitle.
       Top line: "Raisins: N" left-aligned, level name right-aligned.
       Below:    five raisin chips (one fades out per wrong guess / hint). */
    #raisin-bar {
      /* Raisins count left, level name right, single row */
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
      font-size: clamp(1rem, 3.8vw, 1.18rem);
      margin-bottom: 0.55rem;
      padding: 0;
      background: none;
      border: none;
      box-shadow: none;
      text-align: left;
    }
    /* Collapse "Total Raisins: N" → "Raisins: N" on mobile so the whole
       row (count + level name) fits on a single line. */
    #total-raisins .total-prefix { display: none; }
    #current-level { letter-spacing: 0.04em; text-align: right; }
    /* Suppress the desktop "Level: " ::before prefix on mobile — the level
       name now sits at the far right of the row with no label needed. */
    #current-level:not(:empty)::before { content: none; }
    #level-up-message { font-size: 0.95rem; margin-top: 0.35rem; }
    #stake-wrap {
      justify-content: center;
      margin-top: 0.55rem;
      margin-bottom: 1.4rem;
    }
    #stake-raisins { gap: 0.5rem; }
    .stake-raisin {
      width: clamp(26px, 7vw, 34px);
      height: clamp(24px, 6.5vw, 32px);
    }

    #instructions {
      font-size: 0.88rem;
      margin-bottom: 0.55rem;
      letter-spacing: 0.04em;
      opacity: 0.85;
    }

    /* ── Centerpiece: cipher panel ───────────────────────────────────
       flex-grows to absorb most leftover space, but capped so the box
       can't become absurd on tall screens. Inner glow + centered glyphs
       make it feel like a scrying surface, not a swollen rectangle.   */
    #cipher-display {
      flex: 1 1 auto;
      min-height: clamp(5.5rem, 16vh, 9rem);
      max-height: 33vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      /* row-gap, column-gap. column-gap restores the space between
         words that `word-spacing` used to provide before the cipher
         box became a flex container. */
      gap: 0.4em 0.8em;
      padding: clamp(0.7rem, 2.8vw, 1.2rem) clamp(0.75rem, 2.8vw, 1.2rem);
      margin-bottom: 0.45rem;
      font-size: calc(clamp(1.4rem, 6vw, 2rem) * min(var(--sym-scale, 1), 1.2));
      line-height: 1.45;
      box-shadow:
        0 6px 28px rgba(80, 30, 120, 0.22),
        inset 0 0 80px rgba(120, 60, 180, 0.04),
        inset 0 1px 0 rgba(226, 196, 255, 0.02);
    }

    #clue-display {
      font-size: clamp(1.1rem, 4vw, 1.32rem);
      margin-top: 1.1rem;
      margin-bottom: 0.15rem;
      line-height: 1.35;
    }
    #hints-area { min-height: 0; margin-bottom: 0.15rem; }
    .hint {
      font-size: clamp(0.95rem, 3.4vw, 1.1rem);
      padding: 0.28rem 0.6rem;
      margin: 0.2rem 0.3rem;
    }
    #feedback {
      min-height: 0.5rem;
      margin-bottom: 0.55rem;
      font-size: 0.98rem;
    }

    /* ── Action zone: anchored to bottom edge ────────────────────────
       margin-top:auto eats only the small remainder after the cipher's
       cap is reached, producing a clean band of controls flush with the
       bottom of the viewport.                                          */
    #input-area {
      flex-direction: column;
      gap: 0.6rem;
      margin-top: auto;
      margin-bottom: 0.6rem;
    }
    /* Bigger guess box — the primary action surface */
    #guess-input {
      padding: 1.2rem 1.2rem;
      font-size: 1.18rem;
      border-radius: 10px;
      letter-spacing: 0.02em;
    }
    button {
      padding: 0.95rem 1rem;
      font-size: 1rem;
      border-radius: 9px;
    }
    #submit-btn {
      padding: 1.05rem 1rem;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
    }
    #submit-btn { width: 100%; }
    #buttons {
      gap: 0.55rem;
      margin-bottom: 0;
      flex-wrap: wrap;
    }
    #buttons button { flex: 1 1 auto; }

    /* ── Result mode (game over): replaces input/buttons ─────────── */
    #result {
      padding: clamp(0.95rem, 3.2vw, 1.4rem);
      margin-top: auto;
      box-shadow:
        0 6px 28px rgba(80, 30, 120, 0.22),
        inset 0 1px 0 rgba(226, 196, 255, 0.04);
    }
    #result-phrase { font-size: clamp(1rem, 4vw, 1.3rem); margin-bottom: 0.9rem; }
    #result-phrase .typewriter-cursor { height: 0.95em; }
    #result-mapping { font-size: clamp(0.8rem, 3vw, 0.95rem); line-height: 1.7; }
    #result-raisins { font-size: clamp(1rem, 3.6vw, 1.2rem); margin-top: 0.9rem; margin-bottom: 0.9rem; }
    #result-actions { margin-top: 0.9rem; }

    /* Hide the copyright / contact footer on mobile. It's a desktop-only
       affordance — the 48px top padding created a visible empty strip
       below the controls when scrolling, so remove the element entirely. */
    footer { display: none; }
  }

  /* ── Short viewports (landscape phones, iPhone SE) ────────────────
     Trim header weight so the cipher + controls still fit cleanly.   */
  @media (max-width: 600px) and (max-height: 640px) {
    #app { padding: 0.7rem 1rem 0.7rem; }
    .title-row { margin-bottom: 0.1rem; }
    .raisin-svg { width: clamp(24px, 7vw, 36px); height: clamp(22px, 6.2vw, 32px); }
    h1 { font-size: clamp(1.6rem, 7.5vw, 2.1rem); }
    #subtitle { margin-bottom: 0.4rem; font-size: 0.74rem; }
    #instructions { display: none; }
    #raisin-bar { margin-bottom: 0.4rem; gap: 0.35rem; }
    #stake-wrap { gap: 0.3rem; }
    .stake-raisin { width: 22px; height: 20px; }
    #cipher-display {
      min-height: 5rem;
      max-height: 32vh;
      padding: 0.7rem 0.9rem;
    }
    #clue-display { margin-top: 0.4rem; margin-bottom: 0.3rem; }
    #feedback { margin-bottom: 0.4rem; }
    #guess-input { padding: 0.9rem 1rem; font-size: 1.05rem; }
    #submit-btn { padding: 0.85rem 1rem; font-size: 1rem; }
  }
</style>
</head>

<div id="app">

const STARTER_PHRASE_IDS = [97,174,191,199,219,257,270,315,349,361];

let PHRASES = [];

// --- State ---
let game = null;
let lastLevelUp = null;
let scrambleTimer = null;
let typewriterTimer = null;
const MAX_RAISINS = 5;

const REWARD_LEVELS = [
  { threshold: 15,  phrase: "Raise a toast!",                            label: "Raisin Toaster" },
  { threshold: 30,  phrase: "I dub thee, Sir/Madam Raisin",              label: "Sir/Madam Raisin" },
  { threshold: 50,  phrase: "You are my raison d'être",                  label: "Raison d'être" },
  { threshold: 75,  phrase: "You've really raisined the stakes!",        label: "Stake Raiser" },
  { threshold: 100, phrase: "Raisin for Celebration!!",                  label: "Celebrator" },
  { threshold: 150, phrase: "You're an Amazin Raisin!",                  label: "Amazin Raisin" },
  { threshold: 200, phrase: "You have totally raised the bar!",          label: "Bar Raiser" },
  { threshold: 300, phrase: "You really raise and shine!",                label: "Raisin Shine" },
  { threshold: 400, phrase: "You're really, really raisy today!",         label: "Really Raisy" },
];

function getCurrentLevel(total) {
  let current = null;
  for (const level of REWARD_LEVELS) {
    if (total >= level.threshold) current = level;
  }
  return current;
}

function getNextLevel(total) {
  for (const level of REWARD_LEVELS) {
    if (total < level.threshold) return level;
  }
  return null;
}

function checkLevelUp(before, after) {
  let newLevel = null;
  for (const level of REWARD_LEVELS) {
    if (before < level.threshold && after >= level.threshold) newLevel = level;
  }
  return newLevel;
}

// --- localStorage helpers ---
function getUsed() {
  try { return JSON.parse(localStorage.getItem('phraisins_used')) || []; }
  catch { return []; }
}
function saveUsed(used) {
  localStorage.setItem('phraisins_used', JSON.stringify(used));
}
function getTotalRaisins() {
  return parseInt(localStorage.getItem('phraisins_total_raisins')) || 0;
}
function saveTotalRaisins(total) {
  localStorage.setItem('phraisins_total_raisins', JSON.stringify(total));
}
function getStreak() {
  return parseInt(localStorage.getItem('phraisins_streak')) || 0;
}
function saveStreak(n) {
  localStorage.setItem('phraisins_streak', n);
}
function getPerfectStreak() {
  return parseInt(localStorage.getItem('phraisins_perfect_streak')) || 0;
}
function savePerfectStreak(n) {
  localStorage.setItem('phraisins_perfect_streak', n);
}
function getLossStreak() {
  return parseInt(localStorage.getItem('phraisins_loss_streak')) || 0;
}
function saveLossStreak(n) {
  localStorage.setItem('phraisins_loss_streak', n);
}

// --- Encoding ---
function encode(phrase) {
  const letters = [...new Set(phrase.toLowerCase().replace(/[^a-z]/g, '').split(''))].sort();
  const mapping = {};
  letters.forEach((letter, i) => { mapping[letter] = currentSymbols[i]; });
  const encoded = phrase.toLowerCase().split('').map(ch => {
    if (ch === ' ') return '  ';
    return mapping[ch] || ch;
  }).join('');
  return { encoded, mapping };
}

// --- Phrase selection ---
function selectPhrase() {
  let used = getUsed();
  const isStarterGame = used.length === 0 && getTotalRaisins() <= 5;
  if (used.length >= PHRASES.length) {
    used = [];
    saveUsed(used);
  }
  let available = PHRASES.filter(p => !used.includes(p.id));
  if (isStarterGame) {
    const starters = available.filter(p => STARTER_PHRASE_IDS.includes(p.id));
    if (starters.length > 0) available = starters;
  } else if (getStreak() >= 2) {
    const hard = available.filter(p => p.rank >= 3);
    if (hard.length > 0) available = hard;
  } else if (getLossStreak() >= 2) {
    const easy = available.filter(p => p.rank <= 2);
    if (easy.length > 0) available = easy;
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  used.push(pick.id);
  saveUsed(used);
  return pick;
}

// --- Animations ---
function setCipherText(el, text) {
  el.innerHTML = text.split(/  +/).map(w =>
    '<span class="cipher-word">' +
    [...w].map(ch => {
      const escaped = ch.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return '<span class="cipher-char" data-symbol="' + escaped + '">' + escaped + '</span>';
    }).join('') +
    '</span>'
  ).join(' ');
}

function updateCipherDisplay() {
  const charSpans = cipherEl.querySelectorAll('.cipher-char');
  charSpans.forEach(span => {
    const sym = span.getAttribute('data-symbol');
    const hint = game.revealedHints.find(h => h.symbol === sym);
    if (hint) {
      span.textContent = hint.letter;
      span.classList.add('revealed');
    }
  });
}

function animateCipherScramble(encoded, targetEl) {
  if (scrambleTimer) clearInterval(scrambleTimer);
  const chars = [...encoded];
  const totalIterations = 15;
  const symbolSet = new Set(currentSymbols);
  const isSymbolPos = chars.map(ch => symbolSet.has(ch));
  const settleIteration = chars.map((ch, i) => {
    if (!isSymbolPos[i]) return 0;
    const base = Math.floor(6 + (i / chars.length) * (totalIterations - 8));
    return Math.min(base + Math.floor(Math.random() * 3), totalIterations);
  });
  // Measure final-text height and first scramble frame height. Callers
  // must invoke this after any layout-affecting DOM updates have been
  // applied, so the measurement reflects the settled play-mode layout.
  setCipherText(targetEl, encoded);
  const finalHeight = targetEl.offsetHeight;
  let iteration = 0;
  setCipherText(targetEl, chars.map((ch, i) =>
    isSymbolPos[i] ? currentSymbols[Math.floor(Math.random() * currentSymbols.length)] : ch
  ).join(''));
  const scrambleHeight = targetEl.offsetHeight;
  // Lock container to taller of final/scramble heights; overflow hidden as
  // safety net. On mobile, max-height: 30vh still clamps the inline height.
  targetEl.style.height = Math.max(finalHeight, scrambleHeight) + 'px';
  targetEl.style.overflow = 'hidden';
  scrambleTimer = setInterval(() => {
    iteration++;
    let result = '';
    for (let i = 0; i < chars.length; i++) {
      if (iteration >= settleIteration[i]) {
        result += chars[i];
      } else {
        result += currentSymbols[Math.floor(Math.random() * currentSymbols.length)];
      }
    }
    setCipherText(targetEl, result);
    if (iteration >= totalIterations) {
      clearInterval(scrambleTimer);
      scrambleTimer = null;
      setCipherText(targetEl, encoded);
      targetEl.style.height = '';
      targetEl.style.overflow = '';
    }
  }, 110);
}

function typewriterReveal(text, targetEl) {
  if (typewriterTimer) clearInterval(typewriterTimer);
  targetEl.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'typewriter-cursor';
  targetEl.appendChild(cursor);
  let index = 0;
  const delayMs = Math.max(35, 65 - text.length * 0.5);
  typewriterTimer = setInterval(() => {
    if (index < text.length) {
      cursor.before(document.createTextNode(text[index]));
      index++;
    } else {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      setTimeout(() => cursor.remove(), 800);
    }
  }, delayMs);
}

function spawnConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#e8b87a', '#f5d4a0', '#e2c4ff', '#f0deff', '#7cc88a', '#a8b4f0'];
  const shapes = ['50%', '2px'];
  const raisinSvg = '<svg viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<path d="M26 8c-6-1-12 2-16 8-3 5-4 11-2 16 2 6 7 10 14 11 3 0 6 0 9-2 5-3 9-8 10-14 1-5-1-10-4-14-3-3-7-5-11-5z" fill="#542a78"/>'
    + '<path d="M14 16c3 4 5 8 4 13" stroke="#381855" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.7"/>'
    + '<path d="M19 12c1 6-1 13-2 18" stroke="#381855" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>'
    + '<path d="M26 10c0 7-2 14-4 20" stroke="#381855" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.65"/>'
    + '<path d="M32 13c-1 5-3 10-5 15" stroke="#381855" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.55"/>'
    + '<path d="M26 8c0-3 1-5 3-7" stroke="#6b8a3a" stroke-width="2" stroke-linecap="round"/>'
    + '</svg>';
  for (let i = 0; i < 40; i++) {
    const isRaisin = i < 8;
    const p = document.createElement('div');
    p.className = 'confetti-particle';
    p.style.left = (15 + Math.random() * 70) + '%';
    p.style.top = (-5 - Math.random() * 10) + '%';
    p.style.setProperty('--fall-duration', (2 + Math.random() * 1.5) + 's');
    p.style.setProperty('--delay', (Math.random() * 0.4) + 's');
    p.style.setProperty('--rotation', (360 + Math.random() * 720) + 'deg');
    if (isRaisin) {
      const size = 24 + Math.random() * 16;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = 'none';
      p.style.borderRadius = '0';
      p.innerHTML = raisinSvg;
    } else {
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
      const size = 5 + Math.random() * 7;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
    }
    container.appendChild(p);
  }
  setTimeout(() => container.remove(), 4500);
}

// --- Raisin display ---
// Build the 5 stake chips once and keep them in the DOM. updateRaisinDisplay
// then just toggles a `.spent` class on each — preserving the elements
// across updates so CSS transitions can animate the disappearance.
function ensureStakeRaisinChips() {
  if (stakeRaisinsEl.children.length === MAX_RAISINS) return;
  stakeRaisinsEl.innerHTML = '';
  for (let i = 0; i < MAX_RAISINS; i++) {
    const tmp = document.createElement('span');
    tmp.innerHTML = STAKE_RAISIN_SVG;
    stakeRaisinsEl.appendChild(tmp.firstElementChild);
  }
}

function updateRaisinDisplay() {
  const total = getTotalRaisins();
  // Desktop shows "Total Raisins: N"; on mobile the .total-prefix span is
  // hidden via CSS so the label collapses to "Raisins: N" — short enough to
  // stay on one line alongside the level name.
  totalRaisinsEl.innerHTML = '<span class="total-prefix">Total </span>Raisins: ' + total;

  ensureStakeRaisinChips();
  if (game) {
    const remaining = game.raisins;
    Array.from(stakeRaisinsEl.children).forEach((el, i) => {
      // Spend from the right: chips with index >= remaining are gone.
      el.classList.toggle('spent', i >= remaining);
    });
  } else {
    Array.from(stakeRaisinsEl.children).forEach(el => el.classList.remove('spent'));
  }
  // The "Up for grabs" label has been removed; the chips speak for themselves.
  stakeLabelEl.textContent = '';

  hintBtn.disabled = game && game.raisins <= 1;
  const level = getCurrentLevel(total);
  const next = getNextLevel(total);
  if (level) {
    currentLevelEl.textContent = level.label;
    currentLevelEl.classList.remove('next-preview');
  } else if (next) {
    currentLevelEl.textContent = 'Goal: ' + next.threshold;
    currentLevelEl.classList.add('next-preview');
  } else {
    currentLevelEl.textContent = '';
    currentLevelEl.classList.remove('next-preview');
  }
}

function spendRaisin() {
  game.raisins--;
  updateRaisinDisplay();
  if (game.raisins <= 0) {
    showLoss();
    return true;
  }
  return false;
}

// --- Game logic ---
function startGame({ fromNewGame = false } = {}) {
  const used = getUsed();
  const isStarterGame = used.length === 0 && getTotalRaisins() <= 5;
  const group = isStarterGame ? SYMBOL_GROUPS[0] : SYMBOL_GROUPS[Math.floor(Math.random() * SYMBOL_GROUPS.length)];
  currentSymbols = group.symbols;
  cipherEl.style.setProperty('--sym-scale', group.scale || 1);
  const phraseObj = selectPhrase();
  const { encoded, mapping } = encode(phraseObj.phrase);
  const reverseMapping = {};
  for (const [letter, symbol] of Object.entries(mapping)) {
    reverseMapping[symbol] = letter;
  }
  const letters = Object.keys(mapping);
  // Shuffle for hint order
  for (let i = letters.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [letters[i], letters[j]] = [letters[j], letters[i]];
  }
  game = {
    phrase: phraseObj.phrase,
    clue: phraseObj.clue,
    encoded,
    mapping,
    reverseMapping,
    unrevealedLetters: letters,
    revealedHints: [],
    raisins: MAX_RAISINS,
    isOver: false,
    guessCount: 0
  };
  updateRaisinDisplay();
  clueEl.textContent = game.clue;
  hintsEl.innerHTML = '';
  hintsEl.classList.remove('hidden');
  cipherEl.classList.remove('game-over');
  feedbackEl.textContent = '';
  feedbackEl.className = '';
  resultFeedbackEl.textContent = '';
  resultFeedbackEl.className = '';
  resultEl.style.display = 'none';
  guessInput.value = '';
  inputAreaEl.classList.remove('hidden');
  guessInput.disabled = false;
  submitBtn.disabled = false;
  hintBtn.classList.remove('hidden');
  giveupBtn.classList.remove('hidden');
  newgameBtn.classList.add('hidden');
  // Run scramble last — it measures cipher height for its height lock, and
  // that measurement must happen in the final play-mode layout (clue text
  // filled, result panel hidden, input area visible). Measuring earlier
  // would freeze the cipher at a stale flex-allocated size on mobile and
  // push the page past 100dvh until the animation ends.
  animateCipherScramble(encoded, cipherEl);
  if (!(fromNewGame && window.innerWidth <= 768)) {
    guessInput.focus();
  }
}

function normalizeGuess(s) {
  return s.trim().toLowerCase().replace(/\s+/g, ' ');
}

function handleGuess() {
  if (game.isOver) return;
  const guess = normalizeGuess(guessInput.value);
  if (!guess) return;
  game.guessCount++;
  if (guess === normalizeGuess(game.phrase)) {
    showWin();
  } else {
    feedbackEl.textContent = 'Try again.';
    feedbackEl.className = 'feedback-wrong';
    if (!spendRaisin()) {
      revealHint();
    }
    guessInput.value = '';
    guessInput.focus();
  }
}

function revealHint() {
  if (game.unrevealedLetters.length === 0) return;
  if (scrambleTimer) {
    clearInterval(scrambleTimer);
    scrambleTimer = null;
    setCipherText(cipherEl, game.encoded);
    cipherEl.style.height = '';
    cipherEl.style.overflow = '';
  }
  const letter = game.unrevealedLetters.pop();
  const symbol = game.mapping[letter];
  game.revealedHints.push({ symbol, letter });
  updateCipherDisplay();
}

function showWin() {
  game.isOver = true;
  const won = game.raisins;
  const totalBefore = getTotalRaisins();
  saveTotalRaisins(totalBefore + won);
  updateRaisinDisplay();
  subtitleEl.classList.add('hidden-mobile');
  instructionsEl.classList.add('hidden');
  feedbackEl.textContent = '';
  resultFeedbackEl.textContent = 'Correct!';
  resultFeedbackEl.className = 'feedback-correct';
  let raisinText = 'You got ' + won + ' raisin' + (won !== 1 ? 's' : '') + '!';
  lastLevelUp = checkLevelUp(totalBefore, totalBefore + won);
  const levelUp = lastLevelUp;
  if (levelUp) {
    raisinText += '<div id="level-up-message">' + levelUp.phrase + '</div>';
  }
  const newStreak = getStreak() + 1;
  saveStreak(newStreak);
  saveLossStreak(0);
  const isPerfect = (won === MAX_RAISINS);
  const newPerfectStreak = isPerfect ? getPerfectStreak() + 1 : 0;
  savePerfectStreak(newPerfectStreak);
  game.streak = newStreak;
  game.perfectStreak = newPerfectStreak;
  if (newPerfectStreak >= 3 && [3, 6, 10].includes(newPerfectStreak)) {
    raisinText += '<div class="streak-message">You\'re on a streak of perfection \u2014 5/5 for ' + newPerfectStreak + ' in a row!</div>';
  } else if ([3, 6, 10].includes(newStreak)) {
    raisinText += '<div class="streak-message">You\'re on a hot streak! \u2014 ' + newStreak + ' in a row</div>';
  }
  resultRaisinsEl.innerHTML = raisinText;
  const shouldCelebrate = !!levelUp ||
    (newPerfectStreak >= 3 && [3, 6, 10].includes(newPerfectStreak)) ||
    [3, 6, 10].includes(newStreak);
  showResult();
  if (shouldCelebrate) spawnConfetti();
}

function showLoss() {
  game.isOver = true;
  game.raisins = 0;
  saveStreak(0);
  savePerfectStreak(0);
  saveLossStreak(getLossStreak() + 1);
  game.streak = 0;
  game.perfectStreak = 0;
  lastLevelUp = null;
  updateRaisinDisplay();
  subtitleEl.classList.add('hidden-mobile');
  feedbackEl.textContent = '';
  resultFeedbackEl.textContent = game.guessCount > 0 ? 'Nice try!' : 'Better luck next time!';
  resultFeedbackEl.className = 'feedback-wrong';
  resultRaisinsEl.textContent = 'You got 0 raisins.';
  showResult();
}

function revealAllLetters() {
  const revealedSymbols = new Set(game.revealedHints.map(h => h.symbol));
  const charSpans = cipherEl.querySelectorAll('.cipher-char');
  const toReveal = [];
  charSpans.forEach(span => {
    const sym = span.getAttribute('data-symbol');
    if (game.reverseMapping[sym] && !revealedSymbols.has(sym) && !span.classList.contains('revealed')) {
      toReveal.push({ span, letter: game.reverseMapping[sym] });
    }
  });
  toReveal.forEach(({ span, letter }, i) => {
    setTimeout(() => {
      span.textContent = letter;
      span.classList.add('revealed');
    }, i * 40);
  });
  game.unrevealedLetters = [];
}

function showResult() {
  inputAreaEl.classList.add('hidden');
  feedbackEl.classList.add('hidden');
  hintsEl.classList.add('hidden');
  guessInput.disabled = true;
  submitBtn.disabled = true;
  hintBtn.classList.add('hidden');
  giveupBtn.classList.add('hidden');
  newgameBtn.classList.remove('hidden');
  if (scrambleTimer) {
    clearInterval(scrambleTimer);
    scrambleTimer = null;
  }
  setCipherText(cipherEl, game.encoded);
  cipherEl.style.height = '';
  cipherEl.style.overflow = '';
  updateCipherDisplay();
  cipherEl.classList.add('game-over');
  revealAllLetters();
  resultPhraseEl.textContent = '';
  resultMappingEl.innerHTML = '';
  resultEl.style.display = 'block';
}

// --- Share ---
function buildShareText() {
  const won = game.raisins;
  const total = getTotalRaisins();
  const filled = '\u{1F347}'.repeat(won);
  const empty = '\u26AB'.repeat(MAX_RAISINS - won);
  let text = 'PHRAISINS\n';
  text += filled + empty + ' (' + won + '/' + MAX_RAISINS + ')\n';
  const level = getCurrentLevel(total);
  text += 'Total: ' + total + ' raisins';
  if (level) text += ' \u2014 ' + level.label;
  if (lastLevelUp) text += ' \u{1F389}';
  const streak = game.streak || 0;
  const perfectStreak = game.perfectStreak || 0;
  if (perfectStreak >= 3) {
    text += '\n5/5 Streak: ' + perfectStreak + ' in a row!';
  } else if (streak >= 3) {
    text += '\nStreak: ' + streak + ' in a row';
  }
  text += '\nphraisins.com';
  return text;
}

function showToast(msg) {
  shareToast.textContent = msg || 'Copied!';
  shareToast.classList.add('show');
  setTimeout(() => shareToast.classList.remove('show'), 1500);
}

async function shareResult() {
  const text = buildShareText();
  const shareData = { text };
  // Only attempt navigator.share when the browser confirms it can share this
  // payload. Some engines (desktop Edge, certain WebViews) expose navigator.share
  // but reject text-only data; canShare gating lets those engines fall through
  // to the clipboard path instead of failing silently. We intentionally omit
  // `url` — buildShareText already mentions phraisins.com, and including a url
  // causes receivers to render a duplicate link plus the site's OG preview.
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  if (isMobile && navigator.share && (!navigator.canShare || navigator.canShare(shareData))) {
    try {
      await navigator.share(shareData);
      showToast('Shared!');
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  if (navigator.clipboard) {
    try {
      await navigator.clipboard.writeText(text);
      if (!isMobile) showToast('Copied to clipboard!');
      return;
    } catch (e) {}
  }
  // Fallback
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  if (!isMobile) showToast('Copied to clipboard!');
}

// --- Events ---
shareBtn.addEventListener('click', shareResult);
submitBtn.addEventListener('click', handleGuess);
guessInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleGuess();
});
hintBtn.addEventListener('click', () => {
  if (!game.isOver) {
    feedbackEl.textContent = '';
    if (!spendRaisin()) {
      revealHint();
    }
  }
});
giveupBtn.addEventListener('click', () => { if (!game.isOver) showLoss(); });
newgameBtn.addEventListener('click', () => startGame({ fromNewGame: true }));

// --- Init ---
async function init() {
  const loadingTimer = setTimeout(() => {
    clueEl.textContent = 'Loading…';
  }, 500);
  try {
    const response = await fetch('phrases.json');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    PHRASES = await response.json();
  } catch (err) {
    clearTimeout(loadingTimer);
    console.error('Failed to load phrases:', err);
    clueEl.textContent = 'Could not load puzzles. Please refresh.';
    return;
  }
  clearTimeout(loadingTimer);
  updateRaisinDisplay();
  startGame();
}
init();
