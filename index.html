<style>
  :root {
    --bg: #110b1a;
    --bg-panel: #1c1428;
    --accent: #e2c4ff;
    --accent-bright: #f0deff;
    --gold: #e8b87a;
    --gold-bright: #f5d4a0;
    --red: #f06060;
    --text: #ede4d6;
    --dim: #a99bbe;
    --border: #362852;
    --border-light: #4a3870;
    --font: 'Courier New', Consolas, monospace;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image:

      radial-gradient(ellipse at 80% 100%, rgba(90, 30, 120, 0.08) 0%, transparent 50%);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem;
  }
  #app {
    max-width: 860px;
    width: 100%;
  }

  /* --- Title with raisin graphics --- */
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 2.5rem;
  }
  .raisin-svg { flex-shrink: 0; }
  h1 {
    color: var(--gold);
    font-family: var(--font);
    font-size: 3.2rem;
    font-weight: bold;
    letter-spacing: 0.35em;
    margin-right: -0.35em;
    text-align: center;
    text-shadow: 0 2px 16px rgba(160, 100, 50, 0.3);
  }

  /* --- Subtitle --- */
  #subtitle {
    text-align: center;
    color: var(--dim);
    font-size: 1.25rem;
    margin-top: -1.5rem;
    margin-bottom: 2.75rem;
    letter-spacing: 0.1em;
  }
  #instructions {
    text-align: center;
    color: var(--dim);
    font-size: 0.95rem;
    margin-bottom: 1rem;
    opacity: 0.75;
    line-height: 1.4;
  }

  /* --- Raisin counters --- */
  #raisin-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    font-size: 1.3rem;
  }
  #total-raisins { color: var(--gold); }
  #total-raisins-wrap { display: flex; flex-direction: column; }
  #current-level { color: var(--dim); font-size: 0.85rem; margin-top: 0.15rem; }
  #stake-raisins { color: var(--accent); }
  .streak-message {
    margin-top: 0.5em;
    font-weight: bold;
    color: var(--accent);
  }
  #level-up-message {
    color: var(--accent-bright);
    font-size: 1.1rem;
    margin-top: 0.75rem;
    animation: levelUpGlow 1.5s ease-in-out;
  }
  @keyframes levelUpGlow {
    0% { opacity: 0; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* --- Cipher panel --- */
  #cipher-display {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    margin-bottom: 1rem;
    text-align: center;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    word-spacing: 0.5em;
    word-break: break-word;
    line-height: 1.7;
    box-shadow: 0 4px 24px rgba(80, 30, 120, 0.12);
  }

  /* --- Clue --- */
  #clue-display {
    text-align: center;
    color: var(--dim);
    margin-top: 1.5rem;
    margin-bottom: 0.25rem;
    font-size: 1.5rem;
  }
  #clue-display::before { content: 'Clue: '; color: var(--gold); }

  /* --- Hints --- */
  #hints-area {
    margin-bottom: 0.75rem;
    min-height: 1.5rem;
  }
  .hint {
    display: inline-block;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.35rem 0.75rem;
    margin: 0.25rem 0.35rem;
    font-size: 1.25rem;
    color: var(--accent);
  }

  /* --- Input --- */
  #input-area {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  #guess-input {
    flex: 1;
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 0.9rem 1.2rem;
    color: var(--accent-bright);
    font-family: var(--font);
    font-size: 1.15rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #guess-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(232, 184, 122, 0.18);
  }
  #guess-input::placeholder { color: var(--dim); }

  /* --- Buttons --- */
  button {
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 0.9rem 1.5rem;
    color: var(--gold);
    font-family: var(--font);
    font-size: 1.05rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  button:hover {
    border-color: var(--gold);
    background: rgba(232, 184, 122, 0.08);
    box-shadow: 0 2px 8px rgba(232, 184, 122, 0.12);
  }
  #submit-btn { color: #7cc88a; border-color: rgba(124, 200, 138, 0.25); }
  #submit-btn:hover {
    border-color: #7cc88a;
    background: rgba(124, 200, 138, 0.08);
    box-shadow: 0 2px 8px rgba(124, 200, 138, 0.1);
  }
  #giveup-btn { color: #e0976a; border-color: rgba(224, 151, 106, 0.25); }
  #giveup-btn:hover {
    color: #f0ad82;
    border-color: #e0976a;
    background: rgba(224, 151, 106, 0.08);
    box-shadow: 0 2px 8px rgba(224, 151, 106, 0.12);
  }
  #hint-btn { color: #a8b4f0; border-color: rgba(168, 180, 240, 0.25); }
  #hint-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  #hint-btn:hover {
    border-color: #a8b4f0;
    background: rgba(168, 180, 240, 0.08);
    box-shadow: 0 2px 8px rgba(168, 180, 240, 0.1);
  }
  #newgame-btn { color: #7cc88a; border-color: rgba(124, 200, 138, 0.25); margin-bottom: 1.25rem; }
  #newgame-btn:hover {
    border-color: #7cc88a;
    background: rgba(124, 200, 138, 0.08);
    box-shadow: 0 2px 8px rgba(124, 200, 138, 0.1);

  #buttons { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }

  #feedback {
    text-align: center;
    margin-bottom: 1.25rem;
    font-size: 1.15rem;
    min-height: 1.5rem;
  }
  .feedback-wrong { color: var(--red); }
  .feedback-correct { color: var(--accent-bright); }

  /* --- Result --- */
  #result {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    display: none;
    box-shadow: 0 4px 24px rgba(80, 30, 120, 0.12);
  }
  #result h3 { color: var(--gold); margin-bottom: 1rem; font-size: 1.15rem; }
  #result-raisins {
    text-align: center;
    color: var(--gold);
    font-size: 1.25rem;
    margin-top: 1.25rem;
  }
  #result-phrase {
    color: var(--accent);
    font-size: 1.4rem;
    margin-bottom: 1.25rem;
    text-align: center;
  }
  #result-mapping {
    font-size: 1rem;
    color: var(--dim);
    line-height: 2;
    word-break: break-word;
  }

  /* --- Share --- */
  #share-btn {
    display: block;
    margin: 1.25rem auto 0;
    color: #a8b4f0;
    border-color: rgba(168, 180, 240, 0.25);
  }
  #share-btn:hover {
    border-color: #a8b4f0;
    background: rgba(168, 180, 240, 0.08);
    box-shadow: 0 2px 8px rgba(168, 180, 240, 0.1);

  #share-toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    color: var(--accent-bright);
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 1rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  #share-toast.show { opacity: 1; }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    body { padding: 1.25rem 0.75rem; }
    .title-row { gap: 0.6rem; margin-bottom: 1.5rem; }
    .raisin-svg { width: 40px; height: 36px; }
    h1 { font-size: 2rem; letter-spacing: 0.15em; margin-right: -0.15em; }
    #subtitle { font-size: 1rem; margin-top: -0.75rem; margin-bottom: 1rem; }

    #raisin-bar { font-size: 1.1rem; margin-bottom: 1rem; }

    #submit-btn { width: 100%; }
    #buttons { flex-wrap: wrap; }

    #result { padding: 1.25rem; }
    #result-phrase { font-size: 1.15rem; }
    #result-mapping { font-size: 0.9rem; }
  }
</style>
</head>

// --- State ---
let game = null;
let lastLevelUp = null;
const MAX_RAISINS = 5;

const REWARD_LEVELS = [
  { threshold: 15,  phrase: "Raise a toast!",                            label: "Raisin Toaster" },
  { threshold: 30,  phrase: "I dub thee, Sir/Madam Raisin",              label: "Sir/Madam Raisin" },
  { threshold: 50,  phrase: "You are my raison d'être",                  label: "Raison d'être" },
  { threshold: 75,  phrase: "You've really raisined the stakes!",        label: "Stake Raiser" },
  { threshold: 100, phrase: "Raisin for Celebration!!",                  label: "Celebrator" },
  { threshold: 150, phrase: "You're an Amazin Raisin!",                  label: "Amazin Raisin" },
  { threshold: 200, phrase: "You have totally raised the bar! You win!!", label: "Bar Raiser" },
];

function getCurrentLevel(total) {
  let current = null;
  for (const level of REWARD_LEVELS) {
    if (total >= level.threshold) current = level;
  }
  return current;
}

function getNextLevel(total) {
  for (const level of REWARD_LEVELS) {
    if (total < level.threshold) return level;
  }
  return null;
}

function checkLevelUp(before, after) {
  let newLevel = null;
  for (const level of REWARD_LEVELS) {
    if (before < level.threshold && after >= level.threshold) newLevel = level;
  }
  return newLevel;
}

// --- localStorage helpers ---
function getUsed() {
  try { return JSON.parse(localStorage.getItem('phraisins_used')) || []; }
  catch { return []; }
}
function saveUsed(used) {
  localStorage.setItem('phraisins_used', JSON.stringify(used));
}
function getTotalRaisins() {
  return parseInt(localStorage.getItem('phraisins_total_raisins')) || 0;
}
function saveTotalRaisins(total) {
  localStorage.setItem('phraisins_total_raisins', JSON.stringify(total));
}
function getStreak() {
  return parseInt(localStorage.getItem('phraisins_streak')) || 0;
}
function saveStreak(n) {
  localStorage.setItem('phraisins_streak', n);
}
function getPerfectStreak() {
  return parseInt(localStorage.getItem('phraisins_perfect_streak')) || 0;
}
function savePerfectStreak(n) {
  localStorage.setItem('phraisins_perfect_streak', n);
}

// --- Encoding ---
function encode(phrase) {
  const letters = [...new Set(phrase.toLowerCase().replace(/[^a-z]/g, '').split(''))].sort();
  const mapping = {};
  letters.forEach((letter, i) => { mapping[letter] = SYMBOLS[i]; });
  const encoded = phrase.toLowerCase().split('').map(ch => {
    if (ch === ' ') return '  ';
    return mapping[ch] || ch;
  }).join('');
  return { encoded, mapping };
}

// --- Phrase selection ---
function selectPhrase() {
  let used = getUsed();
  if (used.length >= PHRASES.length) {
    used = [];
    saveUsed(used);
  }
  const available = PHRASES.filter(p => !used.includes(p.id));
  const pick = available[Math.floor(Math.random() * available.length)];
  used.push(pick.id);
  saveUsed(used);
  return pick;
}

// --- DOM refs ---
const cipherEl = document.getElementById('cipher-display');
const clueEl = document.getElementById('clue-display');
const hintsEl = document.getElementById('hints-area');
const feedbackEl = document.getElementById('feedback');
const guessInput = document.getElementById('guess-input');
const submitBtn = document.getElementById('submit-btn');
const hintBtn = document.getElementById('hint-btn');
const giveupBtn = document.getElementById('giveup-btn');
const newgameBtn = document.getElementById('newgame-btn');
const buttonsEl = document.getElementById('buttons');
const resultEl = document.getElementById('result');
const inputAreaEl = document.getElementById('input-area');
const resultRaisinsEl = document.getElementById('result-raisins');
const resultPhraseEl = document.getElementById('result-phrase');
const resultMappingEl = document.getElementById('result-mapping');
const shareBtn = document.getElementById('share-btn');
const shareToast = document.getElementById('share-toast');
const instructionsEl = document.getElementById('instructions');
const totalRaisinsEl = document.getElementById('total-raisins');
const stakeRaisinsEl = document.getElementById('stake-raisins');
const currentLevelEl = document.getElementById('current-level');

// --- Instructions (hide if player has won before) ---
if (getTotalRaisins() > 0) {
  instructionsEl.classList.add('hidden');
}

// --- Raisin display ---
function updateRaisinDisplay() {
  const total = getTotalRaisins();
  totalRaisinsEl.textContent = 'Total Raisins: ' + total;
  stakeRaisinsEl.textContent = game ? 'At Stake: ' + game.raisins : '';
  hintBtn.disabled = game && game.raisins <= 1;
  const level = getCurrentLevel(total);
  const next = getNextLevel(total);
  if (level) {
    currentLevelEl.textContent = level.label + (next ? ' (next: ' + next.threshold + ')' : ' (MAX)');
  } else if (next) {
    currentLevelEl.textContent = 'Next level: ' + next.threshold;
  } else {
    currentLevelEl.textContent = '';
  }
}

function spendRaisin() {
  game.raisins--;
  updateRaisinDisplay();
  if (game.raisins <= 0) {
    showLoss();
    return true;
  }
  return false;
}

// --- Game logic ---
function startGame() {
  const phraseObj = selectPhrase();
  const { encoded, mapping } = encode(phraseObj.phrase);
  const reverseMapping = {};
  for (const [letter, symbol] of Object.entries(mapping)) {
    reverseMapping[symbol] = letter;
  }
  const letters = Object.keys(mapping);
  // Shuffle for hint order
  for (let i = letters.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [letters[i], letters[j]] = [letters[j], letters[i]];
  }
  game = {
    phrase: phraseObj.phrase,
    clue: phraseObj.clue,
    encoded,
    mapping,
    reverseMapping,
    unrevealedLetters: letters,
    revealedHints: [],
    raisins: MAX_RAISINS,
    isOver: false
  };
  updateRaisinDisplay();
  cipherEl.textContent = encoded;
  clueEl.textContent = game.clue;
  hintsEl.innerHTML = '';
  feedbackEl.textContent = '';
  feedbackEl.className = '';
  resultEl.style.display = 'none';
  guessInput.value = '';
  inputAreaEl.classList.remove('hidden');
  guessInput.disabled = false;
  submitBtn.disabled = false;
  hintBtn.classList.remove('hidden');
  giveupBtn.classList.remove('hidden');
  newgameBtn.classList.add('hidden');
  guessInput.focus();
}

function handleGuess() {
  if (game.isOver) return;
  const guess = guessInput.value.trim().toLowerCase();
  if (!guess) return;
  if (guess === game.phrase) {
    showWin();
  } else {
    feedbackEl.textContent = 'Incorrect.';
    feedbackEl.className = 'feedback-wrong';
    if (!spendRaisin()) {
      revealHint();
    }
    guessInput.value = '';
    guessInput.focus();
  }
}

function revealHint() {
  if (game.unrevealedLetters.length === 0) return;
  const letter = game.unrevealedLetters.pop();
  const symbol = game.mapping[letter];
  game.revealedHints.push({ symbol, letter });
  const hint = document.createElement('span');
  hint.className = 'hint';
  hint.textContent = `${symbol} = ${letter.toUpperCase()}`;
  hintsEl.appendChild(hint);
}

function showWin() {
  game.isOver = true;
  const won = game.raisins;
  const totalBefore = getTotalRaisins();
  saveTotalRaisins(totalBefore + won);
  updateRaisinDisplay();
  instructionsEl.classList.add('hidden');
  feedbackEl.textContent = 'Correct!';
  feedbackEl.className = 'feedback-correct';
  let raisinText = 'You got ' + won + ' raisin' + (won !== 1 ? 's' : '') + '!';
  lastLevelUp = checkLevelUp(totalBefore, totalBefore + won);
  const levelUp = lastLevelUp;
  if (levelUp) {
    raisinText += '<div id="level-up-message">' + levelUp.phrase + '</div>';
  }
  const newStreak = getStreak() + 1;
  saveStreak(newStreak);
  const isPerfect = (won === MAX_RAISINS);
  const newPerfectStreak = isPerfect ? getPerfectStreak() + 1 : 0;
  savePerfectStreak(newPerfectStreak);
  game.streak = newStreak;
  game.perfectStreak = newPerfectStreak;
  if (newPerfectStreak >= 3 && [3, 6, 10].includes(newPerfectStreak)) {
    raisinText += '<div class="streak-message">You\'re on a streak of perfection \u2014 5/5 for ' + newPerfectStreak + ' in a row!</div>';
  } else if ([3, 6, 10].includes(newStreak)) {
    raisinText += '<div class="streak-message">You\'re on a hot streak! \u2014 ' + newStreak + ' in a row</div>';
  }
  resultRaisinsEl.innerHTML = raisinText;
  showResult();
}

function showLoss() {
  game.isOver = true;
  game.raisins = 0;
  saveStreak(0);
  savePerfectStreak(0);
  game.streak = 0;
  game.perfectStreak = 0;
  lastLevelUp = null;
  updateRaisinDisplay();
  feedbackEl.textContent = 'The answer was:';
  feedbackEl.className = 'feedback-wrong';
  resultRaisinsEl.textContent = 'You got 0 raisins.';
  showResult();
}

function showResult() {
  inputAreaEl.classList.add('hidden');
  guessInput.disabled = true;
  submitBtn.disabled = true;
  hintBtn.classList.add('hidden');
  giveupBtn.classList.add('hidden');
  newgameBtn.classList.remove('hidden');
  resultPhraseEl.textContent = game.phrase;
  const mappingStr = Object.entries(game.mapping)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([letter, symbol]) => `${symbol} = ${letter.toUpperCase()}`)
    .join(' &nbsp;');
  resultMappingEl.innerHTML = mappingStr;
  resultEl.style.display = 'block';
}

// --- Share ---
function buildShareText() {
  const won = game.raisins;
  const total = getTotalRaisins();
  const filled = '\u{1F7E3}'.repeat(won);
  const empty = '\u26AB'.repeat(MAX_RAISINS - won);
  let text = 'PHRAISINS\n';
  text += filled + empty + ' (' + won + '/' + MAX_RAISINS + ')\n';
  const level = getCurrentLevel(total);
  text += 'Total: ' + total + ' raisins';
  if (level) text += ' \u2014 ' + level.label;
  if (lastLevelUp) text += ' \u{1F389}';
  const streak = game.streak || 0;
  const perfectStreak = game.perfectStreak || 0;
  if (perfectStreak >= 3) {
    text += '\n5/5 Streak: ' + perfectStreak + ' in a row!';
  } else if (streak >= 3) {
    text += '\nStreak: ' + streak + ' in a row';
  }
  text += '\nphraisins.com';
  return text;
}

function showToast(msg) {
  shareToast.textContent = msg || 'Copied!';
  shareToast.classList.add('show');
  setTimeout(() => shareToast.classList.remove('show'), 1500);
}

async function shareResult() {
  const text = buildShareText();
  if (navigator.share) {
    try {
      await navigator.share({ text });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  if (navigator.clipboard) {
    try {
      await navigator.clipboard.writeText(text);
      showToast('Copied!');
      return;
    } catch (e) {}
  }
  // Fallback
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('Copied!');
}

// --- Events ---
shareBtn.addEventListener('click', shareResult);
submitBtn.addEventListener('click', handleGuess);
guessInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleGuess();
});
hintBtn.addEventListener('click', () => {
  if (!game.isOver) {
    if (!spendRaisin()) {
      revealHint();
    }
  }
});
giveupBtn.addEventListener('click', () => { if (!game.isOver) showLoss(); });
newgameBtn.addEventListener('click', startGame);

// --- Init ---
updateRaisinDisplay();
startGame();
</script>
